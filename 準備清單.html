<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中央山脈大縱走｜行前準備清單</title>
<style>
  :root {
    --green-dark: #2d5a27;
    --green: #4a8c3f;
    --green-light: #7ab648;
    --brown: #8b5e3c;
    --beige: #f5f0e8;
    --beige-dark: #e8e0d0;
    --white: #ffffff;
    --text: #2c2c2c;
    --text-muted: #7a7a7a;
    --shadow: 0 2px 12px rgba(0,0,0,0.10);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, "PingFang TC", "Helvetica Neue", sans-serif;
    background: var(--beige);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
    color: white;
    padding: 28px 24px 20px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: "⛰";
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 72px;
    opacity: 0.18;
    pointer-events: none;
  }
  header h1 { font-size: 22px; font-weight: 700; letter-spacing: 1px; }
  header p  { font-size: 13px; opacity: 0.85; margin-top: 4px; }

  /* ── Progress ── */
  .progress-wrap {
    margin-top: 16px;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    opacity: 0.9;
    margin-bottom: 6px;
  }
  .progress-bar-bg {
    background: rgba(255,255,255,0.25);
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    background: var(--green-light);
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* ── Category Tabs ── */
  .tabs-wrap {
    background: var(--white);
    border-bottom: 1px solid var(--beige-dark);
    padding: 0 16px;
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 12px 14px;
    border: none;
    background: none;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab-btn.active {
    color: var(--green-dark);
    font-weight: 600;
    border-bottom-color: var(--green);
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* ── Main ── */
  main { max-width: 640px; margin: 0 auto; padding: 20px 16px 100px; }

  /* ── Add Task ── */
  .add-box {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .add-box input[type="text"] {
    flex: 1;
    min-width: 160px;
    border: 1.5px solid var(--beige-dark);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .add-box input[type="text"]:focus { border-color: var(--green); }
  .add-box select {
    border: 1.5px solid var(--beige-dark);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 13px;
    color: var(--text);
    background: var(--white);
    outline: none;
    cursor: pointer;
  }
  .add-box button {
    background: var(--green);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .add-box button:hover { background: var(--green-dark); }

  /* ── Category Section ── */
  .category-section { margin-bottom: 24px; }
  .category-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    padding: 0 4px;
  }
  .category-icon { font-size: 18px; }
  .category-title { font-size: 15px; font-weight: 700; color: var(--green-dark); }
  .category-count {
    margin-left: auto;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── Task Item ── */
  .task-item {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 13px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: opacity 0.2s, transform 0.2s;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-item.done { opacity: 0.55; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--text-muted); }

  .check-btn {
    width: 22px; height: 22px;
    min-width: 22px;
    border-radius: 50%;
    border: 2px solid var(--beige-dark);
    background: var(--white);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.2s;
  }
  .check-btn.checked {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .check-btn:hover { border-color: var(--green); }

  .task-text {
    flex: 1;
    font-size: 14px;
    line-height: 1.4;
  }

  .priority-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .priority-high   { background: #fde8e8; color: #c0392b; }
  .priority-medium { background: #fef3e0; color: #d68910; }
  .priority-low    { background: #e8f5e9; color: var(--green-dark); }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 16px;
    padding: 0 2px;
    transition: color 0.2s;
    line-height: 1;
  }
  .delete-btn:hover { color: #e74c3c; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 32px 0;
    color: var(--text-muted);
    font-size: 14px;
  }
  .empty-state span { font-size: 36px; display: block; margin-bottom: 8px; }

  /* ── Stats footer ── */
  .stats-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--beige-dark);
    padding: 10px 20px;
    display: flex;
    justify-content: center;
    gap: 32px;
    font-size: 12px;
    color: var(--text-muted);
    z-index: 100;
  }
  .stat-item strong { color: var(--green-dark); font-size: 18px; display: block; text-align: center; }

  /* Priority selector */
  .priority-select {
    border: 1.5px solid var(--beige-dark);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 13px;
    color: var(--text);
    background: var(--white);
    outline: none;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <h1>🏔 中央山脈大縱走</h1>
  <p>行前準備清單</p>
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressLabel">完成進度</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>
</header>

<div class="tabs-wrap" id="tabsWrap">
  <button class="tab-btn active" onclick="setFilter('all')" id="tab-all">全部</button>
  <button class="tab-btn" onclick="setFilter('未完成')" id="tab-todo">未完成</button>
  <button class="tab-btn" onclick="setFilter('已完成')" id="tab-done">已完成</button>
</div>

<main>
  <div class="add-box">
    <input type="text" id="newTaskInput" placeholder="新增待辦事項…" onkeydown="if(event.key==='Enter')addTask()">
    <select id="newTaskCat">
      <option value="裝備準備">🎒 裝備</option>
      <option value="體能訓練">💪 體能</option>
      <option value="路線規劃">🗺 路線</option>
      <option value="補給規劃">🍱 補給</option>
      <option value="證件申請">📋 證件</option>
      <option value="緊急應變">🚨 緊急應變</option>
    </select>
    <select class="priority-select" id="newTaskPriority">
      <option value="high">🔴 重要</option>
      <option value="medium" selected>🟡 一般</option>
      <option value="low">🟢 低</option>
    </select>
    <button onclick="addTask()">＋ 新增</button>
  </div>

  <div id="taskContainer"></div>
</main>

<div class="stats-bar">
  <div class="stat-item"><strong id="statTotal">0</strong>總項目</div>
  <div class="stat-item"><strong id="statDone">0</strong>已完成</div>
  <div class="stat-item"><strong id="statLeft">0</strong>待完成</div>
</div>

<script>
const CATEGORIES = [
  { key: "裝備準備",  icon: "🎒", label: "裝備準備" },
  { key: "體能訓練",  icon: "💪", label: "體能訓練" },
  { key: "路線規劃",  icon: "🗺", label: "路線規劃" },
  { key: "補給規劃",  icon: "🍱", label: "補給規劃" },
  { key: "證件申請",  icon: "📋", label: "證件申請" },
  { key: "緊急應變",  icon: "🚨", label: "緊急應變" },
];

let tasks = [
  // 裝備準備
  { id:1,  cat:"裝備準備", text:"登山背包（65–80L）",              done:false, priority:"high"   },
  { id:2,  cat:"裝備準備", text:"帳篷（4 季或三季輕量）",          done:false, priority:"high"   },
  { id:3,  cat:"裝備準備", text:"睡袋（-10°C 以上舒適溫標）",      done:false, priority:"high"   },
  { id:4,  cat:"裝備準備", text:"睡墊",                            done:false, priority:"medium" },
  { id:5,  cat:"裝備準備", text:"登山杖（兩支）",                  done:false, priority:"medium" },
  { id:6,  cat:"裝備準備", text:"頭燈＋備用電池",                  done:false, priority:"high"   },
  { id:7,  cat:"裝備準備", text:"雨衣／雨褲（防水透氣）",          done:false, priority:"high"   },
  { id:8,  cat:"裝備準備", text:"保暖中層（羽絨或化纖）",          done:false, priority:"medium" },
  { id:9,  cat:"裝備準備", text:"登山鞋（防水高筒）",              done:false, priority:"high"   },
  { id:10, cat:"裝備準備", text:"護膝",                            done:false, priority:"low"    },
  { id:11, cat:"裝備準備", text:"個人急救包",                      done:false, priority:"high"   },
  { id:12, cat:"裝備準備", text:"頭巾／帽子／手套",                done:false, priority:"medium" },
  // 體能訓練
  { id:13, cat:"體能訓練", text:"每週 3 次有氧訓練（至少 60 分鐘）",done:false, priority:"high"   },
  { id:14, cat:"體能訓練", text:"負重訓練（漸進式加重）",          done:false, priority:"high"   },
  { id:15, cat:"體能訓練", text:"完成至少一次兩天以上的訓練行程",   done:false, priority:"high"   },
  { id:16, cat:"體能訓練", text:"強化膝蓋與腳踝肌群",              done:false, priority:"medium" },
  { id:17, cat:"體能訓練", text:"高度適應訓練（登百岳）",          done:false, priority:"medium" },
  // 路線規劃
  { id:18, cat:"路線規劃", text:"確定行程段落（北段／中段／南段）", done:false, priority:"high"   },
  { id:19, cat:"路線規劃", text:"收集各段地形圖與 GPX 軌跡",       done:false, priority:"high"   },
  { id:20, cat:"路線規劃", text:"標記水源地點",                    done:false, priority:"high"   },
  { id:21, cat:"路線規劃", text:"研究各段撤退路線",                done:false, priority:"medium" },
  { id:22, cat:"路線規劃", text:"下載離線地圖（Gaia GPS 或 OsmAnd）",done:false,priority:"medium"},
  // 補給規劃
  { id:23, cat:"補給規劃", text:"計算每日熱量需求",                done:false, priority:"high"   },
  { id:24, cat:"補給規劃", text:"規劃前補給站（霧社、大分等）",    done:false, priority:"high"   },
  { id:25, cat:"補給規劃", text:"準備高熱量行動糧食",              done:false, priority:"medium" },
  { id:26, cat:"補給規劃", text:"濾水器或淨水藥錠",               done:false, priority:"high"   },
  { id:27, cat:"補給規劃", text:"瓦斯罐備量規劃",                  done:false, priority:"medium" },
  // 證件申請
  { id:28, cat:"證件申請", text:"申請入山證（警察局線上申請）",    done:false, priority:"high"   },
  { id:29, cat:"證件申請", text:"申請國家公園入園許可",            done:false, priority:"high"   },
  { id:30, cat:"證件申請", text:"辦理旅遊平安保險",                done:false, priority:"high"   },
  { id:31, cat:"證件申請", text:"留下行程計畫書給緊急聯絡人",      done:false, priority:"high"   },
  // 緊急應變
  { id:32, cat:"緊急應變", text:"熟記山難通報電話（119）",         done:false, priority:"high"   },
  { id:33, cat:"緊急應變", text:"準備衛星通訊設備（如 Garmin inReach）",done:false,priority:"medium"},
  { id:34, cat:"緊急應變", text:"學習基礎急救技能（CPR／骨折固定）",done:false,priority:"medium" },
  { id:35, cat:"緊急應變", text:"了解氣象觀測與撤退判斷原則",      done:false, priority:"medium" },
];

let nextId = 36;
let currentFilter = 'all';

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + (f==='all'?'all':f==='未完成'?'todo':'done')).classList.add('active');
  render();
}

function addTask() {
  const input = document.getElementById('newTaskInput');
  const cat   = document.getElementById('newTaskCat').value;
  const pri   = document.getElementById('newTaskPriority').value;
  const text  = input.value.trim();
  if (!text) { input.focus(); return; }
  tasks.push({ id: nextId++, cat, text, done: false, priority: pri });
  input.value = '';
  input.focus();
  render();
}

function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; render(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  render();
}

function render() {
  const container = document.getElementById('taskContainer');
  container.innerHTML = '';

  const total = tasks.length;
  const done  = tasks.filter(t => t.done).length;
  const pct   = total ? Math.round(done / total * 100) : 0;

  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressPct').textContent   = pct + '%';
  document.getElementById('progressLabel').textContent = `完成 ${done} / ${total} 項`;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statDone').textContent  = done;
  document.getElementById('statLeft').textContent  = total - done;

  let visibleTotal = 0;

  CATEGORIES.forEach(cat => {
    let items = tasks.filter(t => t.cat === cat.key);
    if (currentFilter === '未完成') items = items.filter(t => !t.done);
    if (currentFilter === '已完成') items = items.filter(t => t.done);
    if (items.length === 0) return;
    visibleTotal += items.length;

    const section = document.createElement('div');
    section.className = 'category-section';

    const doneInCat = items.filter(t => t.done).length;
    section.innerHTML = `
      <div class="category-header">
        <span class="category-icon">${cat.icon}</span>
        <span class="category-title">${cat.label}</span>
        <span class="category-count">${doneInCat}/${items.length}</span>
      </div>
    `;

    items.forEach(task => {
      const priLabel = { high:'重要', medium:'一般', low:'低' }[task.priority];
      const div = document.createElement('div');
      div.className = 'task-item' + (task.done ? ' done' : '');
      div.innerHTML = `
        <button class="check-btn ${task.done?'checked':''}" onclick="toggleTask(${task.id})">
          ${task.done ? '✓' : ''}
        </button>
        <span class="task-text">${escHtml(task.text)}</span>
        <span class="priority-badge priority-${task.priority}">${priLabel}</span>
        <button class="delete-btn" onclick="deleteTask(${task.id})" title="刪除">×</button>
      `;
      section.appendChild(div);
    });

    container.appendChild(section);
  });

  if (visibleTotal === 0) {
    container.innerHTML = `<div class="empty-state"><span>✅</span>${currentFilter==='已完成'?'還沒有已完成的項目':'所有任務都完成了！'}</div>`;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

render();
</script>
</body>
</html>
